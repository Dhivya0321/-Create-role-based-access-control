<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Role Based Access Control</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#667eea,#764ba2);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:450px;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

input,select{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    background:#667eea;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

.dashboard{
    display:none;
    margin-top:20px;
    padding:15px;
    border-radius:10px;
    background:#f4f4f4;
}

.admin{
    border-left:5px solid red;
}

.manager{
    border-left:5px solid orange;
}

.user{
    border-left:5px solid green;
}
</style>
</head>
<body>

<div class="container">

<h2>Role Based Access Control</h2>

<input type="text" id="username" placeholder="Enter Username">

<select id="role">
    <option value="admin">Admin</option>
    <option value="manager">Manager</option>
    <option value="user">User</option>
</select>

<button onclick="login()">Login</button>

<div id="dashboard" class="dashboard"></div>

</div>

<script>
function login(){

    let username =
    document.getElementById("username").value;

    let role =
    document.getElementById("role").value;

    if(username===""){
        alert("Enter Username");
        return;
    }

    let dashboard =
    document.getElementById("dashboard");

    dashboard.style.display="block";

    if(role==="admin"){
        dashboard.className =
        "dashboard admin";

        dashboard.innerHTML = `
        <h3>Welcome Admin ${username}</h3>
        <p>✅ Manage Users</p>
        <p>✅ Manage Products</p>
        <p>✅ View Reports</p>
        <p>✅ Full System Access</p>
        `;
    }

    if(role==="manager"){
        dashboard.className =
        "dashboard manager";

        dashboard.innerHTML = `
        <h3>Welcome Manager ${username}</h3>
        <p>✅ Manage Products</p>
        <p>✅ View Reports</p>
        <p>❌ Cannot Manage Admins</p>
        `;
    }

    if(role==="user"){
        dashboard.className =
        "dashboard user";

        dashboard.innerHTML = `
        <h3>Welcome User ${username}</h3>
        <p>✅ View Products</p>
        <p>✅ Place Orders</p>
        <p>❌ No Admin Access</p>
        `;
    }
}
</script>

</body>
</html>
